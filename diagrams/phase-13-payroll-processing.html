<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 13: Payroll Processing — User Journey Map</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{margin:0;padding:0;overflow:hidden;width:100vw;height:100vh;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f8f9fa}

/* ── Header ── */
.header{height:38px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;align-items:center;justify-content:space-between;padding:0 16px;color:#fff;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:12px}
.header-title{font-size:12px;font-weight:600;letter-spacing:.3px}
.header-badge{background:linear-gradient(135deg,#e94560,#c23152);font-size:8px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:.5px}
.legend{display:flex;align-items:center;gap:10px;font-size:8px}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-swatch{width:14px;height:10px;border-radius:2px;border:1.5px solid}
.legend-swatch.std{background:#fff;border-color:#90a4ae}
.legend-swatch.ai{background:linear-gradient(135deg,#fff9c4,#ffe082);border-color:#f9a825;border-style:dashed}
.legend-swatch.approval{background:none;border:none;width:18px;height:2px;position:relative}
.legend-swatch.approval::after{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:#e94560}
.legend-swatch.dataflow{background:none;border:none;width:18px;height:2px;position:relative}
.legend-swatch.dataflow::after{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:#2196f3}
.ai-toggle{display:flex;align-items:center;gap:5px;font-size:8px;cursor:pointer;user-select:none}
.ai-toggle input{display:none}
.toggle-track{width:28px;height:14px;background:#555;border-radius:7px;position:relative;transition:background .3s}
.toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;background:#fff;border-radius:50%;transition:transform .3s}
.ai-toggle input:checked+.toggle-track{background:#f9a825}
.ai-toggle input:checked+.toggle-track::after{transform:translateX(14px)}

/* ── Lanes container ── */
.lanes-container{height:calc(100vh - 38px);padding:5px 22px;display:flex;flex-direction:column;gap:4px;position:relative}

/* ── Swim lane ── */
.swim-lane{flex:1 1 0;min-height:0;display:flex;border-radius:8px;overflow:hidden;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.swim-lane.employee{background:#e3f2fd}
.swim-lane.manager{background:#fff3e0}
.swim-lane.admin{background:#f3e5f5}
.lane-label{width:24px;min-width:24px;display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;text-orientation:mixed;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;flex-shrink:0}
.swim-lane.employee .lane-label{background:linear-gradient(180deg,#1565c0,#1976d2)}
.swim-lane.manager .lane-label{background:linear-gradient(180deg,#e65100,#ef6c00)}
.swim-lane.admin .lane-label{background:linear-gradient(180deg,#6a1b9a,#8e24aa)}
.lane-body{flex:1;display:flex;flex-direction:column;gap:4px;justify-content:center;padding:6px 8px;min-width:0}
.node-row{display:flex;align-items:center;gap:4px;flex-wrap:nowrap;min-width:0}

/* ── Nodes ── */
.node{flex:1 1 0;min-width:0;height:32px;border-radius:6px;display:flex;align-items:center;padding:0 6px;cursor:pointer;position:relative;transition:transform .15s,box-shadow .15s;overflow:hidden;opacity:0;transform:scale(.92)}
.node.visible{opacity:1;transform:scale(1)}
.node:hover{transform:scale(1.04)!important;box-shadow:0 3px 12px rgba(0,0,0,.18);z-index:10}
.node.standard{background:#fff;border:1.5px solid #90a4ae}
.node.ai{background:linear-gradient(135deg,#fffde7,#fff9c4);border:1.5px dashed #f9a825}
.node.ai.highlight{animation:aiGlow 2.5s ease-in-out infinite}
@keyframes aiGlow{0%,100%{box-shadow:0 0 4px rgba(249,168,37,.3)}50%{box-shadow:0 0 14px rgba(249,168,37,.7)}}
.node-title{font-size:7.5px;font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;line-height:1.2}
.node-badge{min-width:14px;height:14px;border-radius:7px;background:rgba(0,0,0,.1);font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#555;margin-left:3px;flex-shrink:0}
.node.ai .node-badge{background:rgba(249,168,37,.25);color:#e65100}

/* ── Within-lane arrows ── */
.intra-arrow{flex-shrink:0;width:8px;height:8px;display:flex;align-items:center;justify-content:center}
.intra-arrow svg{width:8px;height:8px}

/* ── Tooltip ── */
.tooltip{position:fixed;background:#1a1a2e;color:#fff;border-radius:8px;padding:10px 12px;font-size:8.5px;max-width:280px;z-index:1000;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 8px 24px rgba(0,0,0,.25);line-height:1.5}
.tooltip.show{opacity:1}
.tooltip-title{font-weight:700;font-size:9.5px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.15)}
.tooltip-title.ai-title{color:#ffe082}
.tooltip ul{list-style:none;padding:0;margin:0}
.tooltip li{padding:1.5px 0;position:relative;padding-left:10px}
.tooltip li::before{content:'\2022';position:absolute;left:0;color:#e94560}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px 24px;max-width:420px;width:90%;max-height:70vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative}
.modal-close{position:absolute;top:10px;right:14px;background:none;border:none;font-size:18px;cursor:pointer;color:#999;line-height:1}
.modal-close:hover{color:#333}
.modal h2{font-size:14px;margin-bottom:4px;color:#1a1a2e}
.modal .modal-type{font-size:9px;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.modal .modal-type.ai-type{color:#f9a825}
.modal ul{list-style:none;padding:0;margin:0}
.modal li{padding:5px 0;font-size:11px;color:#444;border-bottom:1px solid #f0f0f0;position:relative;padding-left:16px;line-height:1.5}
.modal li:last-child{border-bottom:none}
.modal li::before{content:'\2192';position:absolute;left:0;color:#e94560;font-weight:700}
.modal li.ai-bullet::before{color:#f9a825}

/* ── SVG overlay for cross-lane arrows ── */
.arrow-overlay{position:absolute;inset:0;pointer-events:none;z-index:5}
.arrow-path{fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.arrow-path.approval{stroke:#e94560}
.arrow-path.dataflow{stroke:#2196f3}
.arrow-dot{r:3}
.arrow-dot.approval{fill:#e94560}
.arrow-dot.dataflow{fill:#2196f3}
.arrow-head{stroke-width:1.5;fill:none}
.arrow-head.approval{stroke:#e94560}
.arrow-head.dataflow{stroke:#2196f3}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="header-title">Module 13: Payroll Processing — User Journey Map</div>
    <div class="header-badge">AI-Native HRMS</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch std"></div>Standard</div>
    <div class="legend-item"><div class="legend-swatch ai"></div>AI-Powered</div>
    <div class="legend-item"><div class="legend-swatch approval"></div>Approval</div>
    <div class="legend-item"><div class="legend-swatch dataflow"></div>Data Flow</div>
    <label class="ai-toggle"><input type="checkbox" id="aiToggle"><span class="toggle-track"></span>Highlight AI</label>
  </div>
</div>

<!-- Lanes -->
<div class="lanes-container" id="lanesContainer">

  <!-- EMPLOYEE LANE -->
  <div class="swim-lane employee" id="laneEmployee">
    <div class="lane-label">Employee</div>
    <div class="lane-body">
      <div class="node-row" id="empRow1"></div>
      <div class="node-row" id="empRow2"></div>
    </div>
  </div>

  <!-- MANAGER LANE -->
  <div class="swim-lane manager" id="laneManager">
    <div class="lane-label">Manager</div>
    <div class="lane-body">
      <div class="node-row" id="mgrRow1"></div>
      <div class="node-row" id="mgrRow2"></div>
    </div>
  </div>

  <!-- ADMIN / HR LANE -->
  <div class="swim-lane admin" id="laneAdmin">
    <div class="lane-label">Admin / HR</div>
    <div class="lane-body">
      <div class="node-row" id="admRow1"></div>
      <div class="node-row" id="admRow2"></div>
    </div>
  </div>

  <!-- SVG arrow overlay -->
  <svg class="arrow-overlay" id="arrowSvg"></svg>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <h2 id="modalTitle"></h2>
    <div class="modal-type" id="modalType"></div>
    <ul id="modalList"></ul>
  </div>
</div>

// ════════════════════════════════════════
// RENDER NODES
// ════════════════════════════════════════
const intraArrowSvg = `<svg viewBox="0 0 8 8" fill="none"><path d="M1 4h5M4.5 2L6.5 4L4.5 6" stroke="#b0bec5" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function buildRow(containerId, features, type) {
  const row = document.getElementById(containerId);
  features.forEach((f, i) => {
    if (i > 0) {
      const arrow = document.createElement('div');
      arrow.className = 'intra-arrow';
      arrow.innerHTML = intraArrowSvg;
      row.appendChild(arrow);
    }
    const node = document.createElement('div');
    node.className = `node ${type}`;
    node.dataset.id = f.id;
    node.dataset.type = type;
    node.id = f.id;
    const prefix = type === 'ai' ? '\u2726 ' : '';
    node.innerHTML = `<span class="node-title">${prefix}${f.title}</span><span class="node-badge">${f.bullets.length}</span>`;
    node.addEventListener('mouseenter', showTooltip);
    node.addEventListener('mousemove', moveTooltip);
    node.addEventListener('mouseleave', hideTooltip);
    node.addEventListener('click', () => openModal(f, type));
    row.appendChild(node);
  });
}

// Employee
buildRow('empRow1', DATA.employee.standard, 'standard');
buildRow('empRow2', DATA.employee.ai, 'ai');

// Manager
buildRow('mgrRow1', DATA.manager.standard, 'standard');
buildRow('mgrRow2', DATA.manager.ai, 'ai');

// Admin
buildRow('admRow1', DATA.admin.standard, 'standard');
buildRow('admRow2', DATA.admin.ai, 'ai');

// ════════════════════════════════════════
// NODE ENTRANCE ANIMATION
// ════════════════════════════════════════
const allNodes = document.querySelectorAll('.node');
allNodes.forEach((n, i) => {
  setTimeout(() => n.classList.add('visible'), 80 + i * 30);
});

// ════════════════════════════════════════
// TOOLTIP
// ════════════════════════════════════════
const tooltip = document.getElementById('tooltip');
function findFeatureData(id) {
  for (const role of Object.values(DATA)) {
    for (const group of Object.values(role)) {
      const f = group.find(x => x.id === id);
      if (f) return f;
    }
  }
  return null;
}
function showTooltip(e) {
  const node = e.currentTarget;
  const f = findFeatureData(node.dataset.id);
  if (!f) return;
  const type = node.dataset.type;
  const titleClass = type === 'ai' ? 'ai-title' : '';
  const prefix = type === 'ai' ? '\u2726 ' : '';
  tooltip.innerHTML = `<div class="tooltip-title ${titleClass}">${prefix}${f.title}</div><ul>${f.bullets.map(b => `<li>${b}</li>`).join('')}</ul>`;
  tooltip.classList.add('show');
}
function moveTooltip(e) {
  const x = e.clientX + 12;
  const y = e.clientY + 12;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  tooltip.style.left = (x + tw > window.innerWidth ? e.clientX - tw - 8 : x) + 'px';
  tooltip.style.top = (y + th > window.innerHeight ? e.clientY - th - 8 : y) + 'px';
}
function hideTooltip() { tooltip.classList.remove('show'); }

// ════════════════════════════════════════
// MODAL
// ════════════════════════════════════════
const modalOverlay = document.getElementById('modalOverlay');
const modal = document.getElementById('modal');
function openModal(f, type) {
  const prefix = type === 'ai' ? '\u2726 ' : '';
  document.getElementById('modalTitle').textContent = prefix + f.title;
  const typeEl = document.getElementById('modalType');
  typeEl.textContent = type === 'ai' ? 'AI-Powered Feature' : 'Standard Feature';
  typeEl.className = 'modal-type' + (type === 'ai' ? ' ai-type' : '');
  const list = document.getElementById('modalList');
  list.innerHTML = f.bullets.map(b => `<li class="${type === 'ai' ? 'ai-bullet' : ''}">${b}</li>`).join('');
  modalOverlay.classList.add('show');
}
document.getElementById('modalClose').addEventListener('click', () => modalOverlay.classList.remove('show'));
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) modalOverlay.classList.remove('show'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') modalOverlay.classList.remove('show'); });

// ════════════════════════════════════════
// AI HIGHLIGHT TOGGLE
// ════════════════════════════════════════
document.getElementById('aiToggle').addEventListener('change', function() {
  document.querySelectorAll('.node.ai').forEach(n => {
    n.classList.toggle('highlight', this.checked);
  });
});

// ════════════════════════════════════════
// CROSS-LANE ARROWS (routed via margins)
// ════════════════════════════════════════
function drawArrows() {
  const svg = document.getElementById('arrowSvg');
  const container = document.getElementById('lanesContainer');
  const cRect = container.getBoundingClientRect();
  svg.setAttribute('viewBox', `0 0 ${cRect.width} ${cRect.height}`);
  svg.innerHTML = '';

  // Arrow definitions — Payroll Processing flow
  // 1. Employee tax declarations → Admin pay run engine (dataflow)
  // 2. Employee salary advance → Manager advance approvals (approval)
  // 3. Manager input verification → Admin pay run engine (dataflow)
  // 4. Admin pay run engine → Employee payslip access (dataflow)
  // 5. Employee reimbursement claims → Manager reimbursement approvals (approval)

  const arrows = [
    { from:'emp_tax', to:'adm_payrun', type:'dataflow', side:'left', offset:0 },
    { from:'emp_advance', to:'mgr_advance', type:'approval', side:'left', offset:1 },
    { from:'mgr_verify', to:'adm_payrun', type:'dataflow', side:'right', offset:0 },
    { from:'adm_payrun', to:'emp_payslip', type:'dataflow', side:'right', offset:1 },
    { from:'emp_reimburse', to:'mgr_reimburse', type:'approval', side:'right', offset:2 },
  ];

  const leftBase = 4;
  const rightBase = cRect.width - 4;
  const channelStep = 5;

  arrows.forEach(a => {
    const fromEl = document.getElementById(a.from);
    const toEl = document.getElementById(a.to);
    if (!fromEl || !toEl) return;

    const fRect = fromEl.getBoundingClientRect();
    const tRect = toEl.getBoundingClientRect();

    const fx = fRect.left - cRect.left + fRect.width / 2;
    const fy_bottom = fRect.bottom - cRect.top;
    const fy_top = fRect.top - cRect.top;
    const tx = tRect.left - cRect.left + tRect.width / 2;
    const ty_top = tRect.top - cRect.top;
    const ty_bottom = tRect.bottom - cRect.top;

    let channelX;
    if (a.side === 'left') {
      channelX = leftBase + a.offset * channelStep;
    } else {
      channelX = rightBase - a.offset * channelStep;
    }

    let path;
    const goingDown = fy_bottom < ty_top;
    if (goingDown) {
      const sy = fy_bottom + 1;
      const ey = ty_top - 1;
      path = `M${fx},${sy} L${fx},${sy+3} L${channelX},${sy+3} L${channelX},${ey-3} L${tx},${ey-3} L${tx},${ey}`;
    } else {
      const sy = fy_top - 1;
      const ey = ty_bottom + 1;
      path = `M${fx},${sy} L${fx},${sy-3} L${channelX},${sy-3} L${channelX},${ey+3} L${tx},${ey+3} L${tx},${ey}`;
    }

    const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    pathEl.setAttribute('d', path);
    pathEl.setAttribute('class', `arrow-path ${a.type}`);
    pathEl.setAttribute('fill', 'none');
    pathEl.id = `arrow_${a.from}_${a.to}`;
    svg.appendChild(pathEl);

    const headSize = 5;
    let headPath;
    if (goingDown) {
      headPath = `M${tx-headSize},${ty_top-1-headSize} L${tx},${ty_top-1} L${tx+headSize},${ty_top-1-headSize}`;
    } else {
      headPath = `M${tx-headSize},${ty_bottom+1+headSize} L${tx},${ty_bottom+1} L${tx+headSize},${ty_bottom+1+headSize}`;
    }
    const head = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    head.setAttribute('d', headPath);
    head.setAttribute('class', `arrow-head ${a.type}`);
    svg.appendChild(head);

    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('class', `arrow-dot ${a.type}`);
    dot.setAttribute('r', '3');
    const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
    anim.setAttribute('dur', '3s');
    anim.setAttribute('repeatCount', 'indefinite');
    anim.setAttribute('path', path);
    dot.appendChild(anim);
    svg.appendChild(dot);
  });
}

setTimeout(drawArrows, 500);
window.addEventListener('resize', () => { clearTimeout(window._arrowTimer); window._arrowTimer = setTimeout(drawArrows, 100); });
</script>
</body>
</html>
